<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E1E"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="0" y="0" width="100%" height="100%" rx="160" fill="url(#bg)"/>
  
  <!-- Sound wave - left side (kept) - taller -->
  <g fill="#E1E1E1">
    <rect x="180" y="380" width="36" height="200" rx="18" opacity="0.9"/>
    <rect x="246" y="320" width="36" height="320" rx="18" opacity="0.8"/>
    <rect x="312" y="360" width="36" height="240" rx="18" opacity="0.7"/>
    <rect x="378" y="300" width="36" height="360" rx="18" opacity="0.6"/>
  </g>
  
  <!-- Cut line -->
  <line x1="540" y1="240" x2="540" y2="784" stroke="#FF8400" stroke-width="32" stroke-linecap="round"/>
  
  <!-- Sound wave - right side (after cut) - taller -->
  <g fill="#FF8400" opacity="0.9">
    <rect x="596" y="360" width="36" height="240" rx="18"/>
    <rect x="662" y="320" width="36" height="320" rx="18"/>
    <rect x="728" y="380" width="36" height="200" rx="18"/>
    <rect x="794" y="300" width="36" height="360" rx="18"/>
  </g>
  
  <!-- Small scissors detail -->
  <g transform="translate(540, 240)">
    <circle cx="0" cy="0" r="28" fill="#121212" stroke="#FF8400" stroke-width="6"/>
    <path d="M -12 -15 L 0 0 L 12 -15 M -12 15 L 0 0 L 12 15" stroke="#FF8400" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>